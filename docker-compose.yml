services:
  postal-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: postal-api:latest
    restart: unless-stopped
    environment:
      APP_NAME: postal-api
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: $SERVICE_URL_POSTAL_API

      LOG_CHANNEL: stack
      LOG_STACK: single
      LOG_LEVEL: info

      DB_CONNECTION: mariadb
      DB_HOST: postal-api-db
      DB_PORT: "3306"
      DB_DATABASE: postal_api
      DB_USERNAME: postal_api
      DB_PASSWORD: ${SERVICE_PASSWORD_POSTALAPIDB}

      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: sync

      BROADCAST_CONNECTION: log
      FILESYSTEM_DISK: local

      # Cross-stack: credentials to reach Postal's MariaDB on the shared `postal` network
      POSTAL_DB_HOST: mariadb
      POSTAL_DB_PORT: "3306"
      POSTAL_DB_USERNAME: ${POSTAL_DB_USERNAME:-}
      POSTAL_DB_PASSWORD: ${POSTAL_DB_PASSWORD:-}
    volumes:
      - postal-api-storage:/app/storage/app
    expose:
      - "8080"
    networks:
      - default
      - postal
    depends_on:
      postal-api-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/up"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  postal-api-db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${SERVICE_PASSWORD_POSTALAPIDBROOT}
      MARIADB_DATABASE: postal_api
      MARIADB_USER: postal_api
      MARIADB_PASSWORD: ${SERVICE_PASSWORD_POSTALAPIDB}
    volumes:
      - postal-api-db-data:/var/lib/mysql
    networks:
      - default
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postal-api-storage:
  postal-api-db-data:

networks:
  default:
    name: postal-api
  postal:
    external: true
    name: postal
